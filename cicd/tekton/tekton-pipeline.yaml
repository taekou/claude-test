---
# Harbor 인증 Secret (Tekton Task에서 사용)
apiVersion: v1
kind: Secret
metadata:
  name: harbor-credentials
  namespace: tekton-pipelines
  annotations:
    tekton.dev/docker-0: http://172.18.0.2:30002
type: kubernetes.io/basic-auth
stringData:
  username: admin
  password: Harbor12345
---
# Tekton ServiceAccount (Harbor push 권한)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-build-sa
  namespace: tekton-pipelines
secrets:
- name: harbor-credentials
---
# Task 1: Git Clone
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: tekton-pipelines
spec:
  params:
  - name: url
    type: string
  - name: revision
    type: string
    default: main
  workspaces:
  - name: source
  steps:
  - name: clone
    image: alpine/git:latest
    script: |
      #!/bin/sh
      cd $(workspaces.source.path)
      git clone --depth=1 --branch $(params.revision) $(params.url) .
      echo "Cloned: $(params.url)"
      ls -la
---
# Task 2: Kaniko Build & Push to Harbor
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kaniko-build
  namespace: tekton-pipelines
spec:
  params:
  - name: image
    type: string
  - name: tag
    type: string
    default: latest
  - name: context
    type: string
    default: .
  workspaces:
  - name: source
  - name: dockerconfig
    optional: true
  steps:
  - name: build-and-push
    image: gcr.io/kaniko-project/executor:latest
    env:
    - name: DOCKER_CONFIG
      value: /kaniko/.docker
    args:
    - --context=$(workspaces.source.path)/$(params.context)
    - --destination=$(params.image):$(params.tag)
    - --destination=$(params.image):latest
    - --insecure
    - --skip-tls-verify
    - --cache=false
---
# Task 3: ArgoCD Sync 트리거
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: argocd-sync
  namespace: tekton-pipelines
spec:
  params:
  - name: app-name
    type: string
  - name: argocd-server
    type: string
    default: argocd-server.argocd.svc.cluster.local
  - name: argocd-password
    type: string
  steps:
  - name: sync
    image: argoproj/argocd:latest
    script: |
      #!/bin/sh
      argocd app sync $(params.app-name) \
        --server $(params.argocd-server) \
        --auth-token "" \
        --plaintext \
        --insecure \
        --grpc-web || true
      echo "ArgoCD sync triggered for: $(params.app-name)"
---
# Pipeline: clone → build → push to Harbor → argocd sync
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-and-deploy
  namespace: tekton-pipelines
spec:
  params:
  - name: git-url
    type: string
    description: "Git 저장소 URL"
  - name: git-revision
    type: string
    default: main
  - name: image
    type: string
    description: "Harbor 이미지 경로 (예: 172.18.0.2:30002/apps/demo-app)"
  - name: image-tag
    type: string
    default: latest
  - name: argocd-app
    type: string
    default: demo-app
  workspaces:
  - name: source
  tasks:
  - name: clone
    taskRef:
      name: git-clone
    params:
    - name: url
      value: $(params.git-url)
    - name: revision
      value: $(params.git-revision)
    workspaces:
    - name: source
      workspace: source
  - name: build-push
    taskRef:
      name: kaniko-build
    runAfter: [clone]
    params:
    - name: image
      value: $(params.image)
    - name: tag
      value: $(params.image-tag)
    workspaces:
    - name: source
      workspace: source
